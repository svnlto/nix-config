---
name: Pre-commit Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install Dependencies with Nix
        run: |
          # Install all dependencies via Nix
          nix profile install nixpkgs#pre-commit nixpkgs#nixfmt nixpkgs#statix nixpkgs#deadnix nixpkgs#shellcheck nixpkgs#markdownlint-cli

      - name: Run pre-commit hooks
        run: |
          # Run pre-commit hooks
          pre-commit run --all-files
