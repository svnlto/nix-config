---
name: Pre-commit Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install Dependencies with Nix
        run: |
          # Install all dependencies via Nix
          nix profile install nixpkgs#pre-commit nixpkgs#nixfmt-classic nixpkgs#statix nixpkgs#deadnix nixpkgs#shellcheck nixpkgs#markdownlint-cli

      - name: Run pre-commit hooks
        run: |
          # Run pre-commit hooks
          pre-commit run --all-files
