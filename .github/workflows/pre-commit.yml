---
name: Pre-commit Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install Dependencies with Nix
        run: |
          # Install all dependencies via Nix
          nix profile install nixpkgs#pre-commit nixpkgs#nixfmt-classic nixpkgs#statix nixpkgs#deadnix nixpkgs#shellcheck nixpkgs#markdownlint-cli

      - name: Run pre-commit hooks
        run: |
          # Run pre-commit hooks
          pre-commit run --all-files
